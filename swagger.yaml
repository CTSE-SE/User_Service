openapi: 3.0.0
info:
  title: User Service API
  version: 1.0.0
  description: User Service for Food Ordering System

servers:
  - url: http://localhost:3002

paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is healthy

  /api/users/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fullName
                - email
                - password
                - phone
                - address
              properties:
                fullName:
                  type: string
                email:
                  type: string
                password:
                  type: string
                phone:
                  type: string
                address:
                  type: string
      responses:
        "201":
          description: User registered successfully

  /api/users/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login successful

  /api/users/profile:
    get:
      summary: Get logged-in user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile fetched successfully
    put:
      summary: Update logged-in user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile updated successfully

  /api/users/exists/{id}:
    get:
      summary: Check whether a user exists
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User existence checked

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT